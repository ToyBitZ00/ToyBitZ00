name: 🔄 Auto-Update README

on:
  schedule:
    - cron: '0 0 * * *'   # Runs every day at midnight UTC
  push:
    branches: [main]       # Also runs whenever you push to main
  workflow_dispatch:       # Lets you trigger it manually from GitHub

jobs:
  update-readme:
    name: Update README with latest GitHub stats
    runs-on: ubuntu-latest

    permissions:
      contents: write      # Needed to commit the updated README back

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🚀 Run README updater script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ToyBitZ00
        run: python scripts/update_readme.py

      - name: 💾 Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add README.md
          git diff --staged --quiet || git commit -m "🤖 Auto-update README [$(date +'%Y-%m-%d')]"
          git push
